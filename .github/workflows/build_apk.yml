name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            openjdk-17-jdk-headless \
            zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev git
          pip3 install --user buildozer cython virtualenv

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          printf "\nd56f5187479451eabf01fb78af6dfcb131a6481e" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license-2

      - name: Build APK
        run: |
          export PATH=$PATH:/home/runner/.local/bin
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IP_Floater_APK
          path: bin/*.apk
