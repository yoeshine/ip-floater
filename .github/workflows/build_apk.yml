name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            openjdk-17-jdk-headless \
            zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev git
          pip3 install --user buildozer cython virtualenv

      - name: Build APK
        run: |
          export PATH=$PATH:/home/runner/.local/bin
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IP_Floater_APK
          path: bin/*.apk
